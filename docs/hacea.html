<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacea Coffee Explorer</title>
<style>
  :root {
    --bg: #faf6f1;
    --surface: #fff;
    --border: #e0d5c7;
    --text: #3b2f2f;
    --text-muted: #7a6a5a;
    --accent: #8b5e3c;
    --accent-light: #c49a6c;
    --highlight: #f5ebe0;
    --row-hover: #fdf2e9;
    --selected: #f0e0cc;
    --score-low: #d4a373;
    --score-mid: #b5835a;
    --score-high: #6b4226;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .nav-link {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.3rem 0.6rem;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    white-space: nowrap;
  }
  .nav-link:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  #search {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    padding: 0.5rem 0.75rem;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    background: rgba(255,255,255,0.9);
    color: var(--text);
  }
  #search::placeholder { color: var(--text-muted); }

  #stats {
    font-size: 0.85rem;
    opacity: 0.85;
    white-space: nowrap;
  }

  main {
    display: flex;
    flex-direction: column;
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem;
    gap: 1rem;
  }

  /* --- Table --- */
  #table-container {
    overflow-x: auto;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--highlight);
    border-bottom: 2px solid var(--border);
    padding: 0.6rem 0.75rem;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-weight: 600;
    color: var(--accent);
  }
  thead th:hover { background: var(--selected); }
  thead th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }

  tbody tr {
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.selected { background: var(--selected); }
  tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }

  td {
    padding: 0.5rem 0.75rem;
    white-space: nowrap;
  }
  td.wrap { white-space: normal; max-width: 300px; }

  /* --- Detail Panel --- */
  #detail-panel {
    display: none;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 1.25rem;
  }
  #detail-panel.visible { display: block; }

  #detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  #detail-header h2 {
    font-size: 1.2rem;
    color: var(--accent);
  }

  #detail-header a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.85rem;
  }
  #detail-header a:hover { text-decoration: underline; }

  #close-detail {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  #close-detail:hover { background: var(--highlight); }

  /* --- Score Gauge --- */
  .score-gauge {
    margin-bottom: 1.25rem;
  }
  .score-gauge h3 {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }
  .gauge-container {
    position: relative;
    height: 28px;
    background: #ede0d4;
    border-radius: 14px;
    overflow: hidden;
    max-width: 400px;
  }
  .gauge-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 0.4s ease;
  }
  .gauge-label {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .gauge-scale {
    display: flex;
    justify-content: space-between;
    max-width: 400px;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 2px;
    padding: 0 4px;
  }

  #detail-specs {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.5rem 1.5rem;
    margin-bottom: 1rem;
    font-size: 0.875rem;
  }
  .spec-item { display: flex; gap: 0.4rem; }
  .spec-label { font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .spec-value { color: var(--text); }

  .notes-section { margin-bottom: 1rem; }
  .notes-section h3 {
    font-size: 0.9rem;
    color: var(--accent);
    margin-bottom: 0.35rem;
  }
  .notes-section p {
    font-size: 0.875rem;
    color: var(--text);
    line-height: 1.6;
  }

  /* --- Loading --- */
  #loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    header { flex-direction: column; align-items: stretch; }
    #search { max-width: none; }
    #detail-specs { grid-template-columns: 1fr; }
    td { font-size: 0.8rem; padding: 0.4rem 0.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Hacea Coffee Explorer</h1>
  <a class="nav-link" href="index.html">Sweet Maria's</a>
  <a class="nav-link" href="cbc.html">Coffee Bean Corral</a>
  <a class="nav-link" href="https://cyrusmaher.github.io/coffee-explorer/">Roasted Coffee</a>
  <input type="text" id="search" placeholder="Search coffees (e.g. &quot;chocolate&quot;, &quot;Ethiopia&quot;, &quot;natural&quot;)...">
  <span id="stats"></span>
</header>

<main>
  <div id="loading">Loading coffee data...</div>

  <div id="detail-panel">
    <div id="detail-header">
      <div>
        <h2 id="detail-name"></h2>
        <a id="detail-link" href="#" target="_blank" rel="noopener">View on Hacea Coffee</a>
      </div>
      <button id="close-detail">Close</button>
    </div>
    <div id="score-gauge" class="score-gauge"></div>
    <div id="detail-specs"></div>
    <div id="detail-notes"></div>
  </div>

  <div id="table-container">
    <table>
      <thead><tr id="table-head"></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</main>

<script>
/* ---------- Config ---------- */
const TABLE_COLS = [
  { key: "name",              label: "Name",        wrap: true },
  { key: "price",             label: "Price",       sort: "price" },
  { key: "sca_cupping_score", label: "SCA Score",   sort: "num" },
  { key: "country",           label: "Country" },
  { key: "processing",        label: "Processing" },
  { key: "varieties",         label: "Varieties",   wrap: true },
  { key: "altitude",          label: "Altitude" },
];

const SPEC_FIELDS = [
  { key: "price", label: "Price" },
  { key: "sca_cupping_score", label: "SCA Score" },
  { key: "country", label: "Country" },
  { key: "region", label: "Region" },
  { key: "washing_station", label: "Washing Station" },
  { key: "cooperative", label: "Cooperative" },
  { key: "farmer_grower", label: "Farmer/Grower" },
  { key: "varieties", label: "Varieties" },
  { key: "processing", label: "Processing" },
  { key: "altitude", label: "Altitude" },
  { key: "humidity", label: "Humidity" },
  { key: "density", label: "Density" },
  { key: "harvest_date", label: "Harvest Date" },
  { key: "arrival_date", label: "Arrival Date" },
  { key: "grade", label: "Grade" },
  { key: "marks", label: "Marks" },
  { key: "reference_id", label: "Reference ID" },
  { key: "tariff_cost", label: "Tariff Cost" },
  { key: "coordinates", label: "Coordinates" },
];

/* ---------- State ---------- */
let allCoffees = [];
let filtered = [];
let sortCol = "sca_cupping_score";
let sortDir = -1;  // descending
let selectedIdx = -1;

/* ---------- Data loading ---------- */
fetch("hacea-data.json")
  .then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(data => {
    allCoffees = data;
    filtered = [...allCoffees];
    document.getElementById("loading").style.display = "none";
    buildTableHead();
    sortAndRender();
  })
  .catch(err => {
    document.getElementById("loading").textContent = "Failed to load data: " + err.message;
  });

/* ---------- Search ---------- */
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    filtered = [...allCoffees];
  } else {
    filtered = allCoffees.filter(c =>
      Object.values(c).some(v => String(v).toLowerCase().includes(q))
    );
  }
  selectedIdx = -1;
  sortAndRender();
});

/* ---------- Table head ---------- */
function buildTableHead() {
  const tr = document.getElementById("table-head");
  tr.innerHTML = "";
  TABLE_COLS.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col.label;
    th.dataset.key = col.key;
    if (col.key === sortCol) {
      th.innerHTML += '<span class="sort-arrow">' + (sortDir > 0 ? "\u25B2" : "\u25BC") + '</span>';
    }
    th.addEventListener("click", () => {
      if (sortCol === col.key) {
        sortDir *= -1;
      } else {
        sortCol = col.key;
        sortDir = col.key === "name" ? 1 : -1;
      }
      sortAndRender();
    });
    tr.appendChild(th);
  });
}

/* ---------- Sorting ---------- */
function sortVal(c, key) {
  const v = c[key] || "";
  if (key === "price") {
    return parseFloat(v.replace("$", "")) || 0;
  }
  if (key === "sca_cupping_score") {
    return parseFloat(v) || 0;
  }
  return v.toLowerCase();
}

function sortAndRender() {
  filtered.sort((a, b) => {
    const va = sortVal(a, sortCol);
    const vb = sortVal(b, sortCol);
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
  renderTable();
  buildTableHead();
  document.getElementById("stats").textContent = filtered.length + " coffees";
}

/* ---------- Table body ---------- */
function renderTable() {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  filtered.forEach((c, i) => {
    const tr = document.createElement("tr");
    if (i === selectedIdx) tr.classList.add("selected");
    TABLE_COLS.forEach(col => {
      const td = document.createElement("td");
      td.textContent = c[col.key] || "";
      if (col.wrap) td.classList.add("wrap");
      tr.appendChild(td);
    });
    tr.addEventListener("click", () => showDetail(i));
    tbody.appendChild(tr);
  });
}

/* ---------- Detail panel ---------- */
function showDetail(idx) {
  selectedIdx = idx;
  const c = filtered[idx];
  const panel = document.getElementById("detail-panel");

  document.getElementById("detail-name").textContent = c.name;
  const link = document.getElementById("detail-link");
  link.href = c.url;
  link.textContent = "View on Hacea Coffee \u2192";

  // Score gauge
  const gaugeEl = document.getElementById("score-gauge");
  const score = parseFloat(c.sca_cupping_score) || 0;
  if (score > 0) {
    // SCA scores typically range 60-100; show 70-95 as practical range
    const minScore = 70;
    const maxScore = 95;
    const pct = Math.max(0, Math.min(100, ((score - minScore) / (maxScore - minScore)) * 100));
    const color = score >= 87 ? "#6b4226" : score >= 84 ? "#8b5e3c" : score >= 80 ? "#b5835a" : "#d4a373";
    gaugeEl.innerHTML =
      '<h3>SCA Cupping Score</h3>' +
      '<div class="gauge-container">' +
        '<div class="gauge-fill" style="width:' + pct + '%;background:' + color + '"></div>' +
        '<div class="gauge-label">' + score.toFixed(2) + '</div>' +
      '</div>' +
      '<div class="gauge-scale"><span>' + minScore + '</span><span>' + maxScore + '</span></div>';
  } else {
    gaugeEl.innerHTML = "";
  }

  // Specs
  const specsEl = document.getElementById("detail-specs");
  specsEl.innerHTML = SPEC_FIELDS
    .filter(f => c[f.key])
    .map(f => '<div class="spec-item"><span class="spec-label">' + esc(f.label) + ':</span><span class="spec-value">' + esc(c[f.key]) + '</span></div>')
    .join("");

  // Notes
  const notesEl = document.getElementById("detail-notes");
  let notesHtml = "";
  if (c.tasting_notes) {
    notesHtml += '<div class="notes-section"><h3>Tasting Notes</h3><p>' + esc(c.tasting_notes) + '</p></div>';
  }
  if (c.roasting_notes) {
    notesHtml += '<div class="notes-section"><h3>Roasting Notes</h3><p>' + esc(c.roasting_notes) + '</p></div>';
  }
  if (c.story) {
    notesHtml += '<div class="notes-section"><h3>Origin Story</h3><p>' + esc(c.story) + '</p></div>';
  }
  notesEl.innerHTML = notesHtml;

  panel.classList.add("visible");
  panel.scrollIntoView({ behavior: "smooth", block: "start" });
  renderTable();
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById("close-detail").addEventListener("click", () => {
  document.getElementById("detail-panel").classList.remove("visible");
  selectedIdx = -1;
  renderTable();
});
</script>
</body>
</html>
