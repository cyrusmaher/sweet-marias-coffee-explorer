<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Bean Corral Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #faf6f1;
    --surface: #fff;
    --border: #e0d5c7;
    --text: #3b2f2f;
    --text-muted: #7a6a5a;
    --accent: #8b5e3c;
    --accent-light: #c49a6c;
    --highlight: #f5ebe0;
    --row-hover: #fdf2e9;
    --selected: #f0e0cc;
    --star-color: #d4a017;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .nav-links { display: flex; gap: 0.5rem; }

  .nav-link {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.3rem 0.6rem;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    white-space: nowrap;
  }
  .nav-link:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  #search {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    padding: 0.5rem 0.75rem;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    background: rgba(255,255,255,0.9);
    color: var(--text);
  }
  #search::placeholder { color: var(--text-muted); }

  #stats {
    font-size: 0.85rem;
    opacity: 0.85;
    white-space: nowrap;
  }

  main {
    display: flex;
    flex-direction: column;
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem;
    gap: 1rem;
  }

  /* --- Table --- */
  #table-container {
    overflow-x: auto;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--highlight);
    border-bottom: 2px solid var(--border);
    padding: 0.6rem 0.75rem;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-weight: 600;
    color: var(--accent);
  }
  thead th:hover { background: var(--selected); }
  thead th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }

  tbody tr {
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.selected { background: var(--selected); }
  tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }

  td {
    padding: 0.5rem 0.75rem;
    white-space: nowrap;
  }
  td.wrap { white-space: normal; max-width: 300px; }

  .stars { color: var(--star-color); letter-spacing: 1px; }

  /* --- Detail Panel --- */
  #detail-panel {
    display: none;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 1.25rem;
  }
  #detail-panel.visible { display: block; }

  #detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  #detail-header h2 {
    font-size: 1.2rem;
    color: var(--accent);
  }

  #detail-header a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.85rem;
  }
  #detail-header a:hover { text-decoration: underline; }

  #close-detail {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  #close-detail:hover { background: var(--highlight); }

  .detail-rating {
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
  }
  .detail-rating .stars { font-size: 1.2rem; }
  .detail-rating .review-count { font-size: 0.85rem; color: var(--text-muted); margin-left: 0.5rem; }

  #charts-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .chart-wrapper {
    text-align: center;
  }
  .chart-wrapper h3 {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .chart-wrapper canvas {
    max-height: 320px;
  }

  #detail-specs {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.5rem 1.5rem;
    margin-bottom: 1rem;
    font-size: 0.875rem;
  }
  .spec-item { display: flex; gap: 0.4rem; }
  .spec-label { font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .spec-value { color: var(--text); }

  .notes-section { margin-bottom: 1rem; }
  .notes-section h3 {
    font-size: 0.9rem;
    color: var(--accent);
    margin-bottom: 0.35rem;
  }
  .notes-section p {
    font-size: 0.875rem;
    color: var(--text);
    line-height: 1.6;
  }

  /* --- Loading --- */
  #loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    header { flex-direction: column; align-items: stretch; }
    #search { max-width: none; }
    #charts-container { grid-template-columns: 1fr; }
    #detail-specs { grid-template-columns: 1fr; }
    td { font-size: 0.8rem; padding: 0.4rem 0.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Coffee Bean Corral Explorer</h1>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Sweet Maria's</a>
    <a class="nav-link" href="hacea.html">Hacea Coffee</a>
    <a class="nav-link" href="https://cyrusmaher.github.io/coffee-explorer/">Roasted Coffee</a>
  </div>
  <input type="text" id="search" placeholder="Search coffees (e.g. &quot;fruity&quot;, &quot;Ethiopia&quot;, &quot;natural&quot;)...">
  <span id="stats"></span>
</header>

<main>
  <div id="loading">Loading coffee data...</div>

  <div id="detail-panel">
    <div id="detail-header">
      <div>
        <h2 id="detail-name"></h2>
        <a id="detail-link" href="#" target="_blank" rel="noopener">View on Coffee Bean Corral</a>
      </div>
      <button id="close-detail">Close</button>
    </div>
    <div id="detail-rating" class="detail-rating"></div>
    <div id="charts-container">
      <div class="chart-wrapper">
        <h3>Attributes (1-7)</h3>
        <canvas id="attr-chart"></canvas>
      </div>
      <div class="chart-wrapper">
        <h3>Flavors (1-4)</h3>
        <canvas id="flavor-chart"></canvas>
      </div>
    </div>
    <div id="detail-specs"></div>
    <div id="detail-notes"></div>
  </div>

  <div id="table-container">
    <table>
      <thead><tr id="table-head"></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</main>

<script>
/* ---------- Config ---------- */
const TABLE_COLS = [
  { key: "name",         label: "Name",       wrap: true },
  { key: "price",        label: "Price",      sort: "price" },
  { key: "rating",       label: "Rating",     sort: "num" },
  { key: "country",      label: "Country" },
  { key: "process",      label: "Process" },
  { key: "category",     label: "Category" },
  { key: "variety",      label: "Variety",    wrap: true },
];

const ATTR_KEYS = ["attr_brightness", "attr_body", "attr_aroma", "attr_complexity", "attr_balance", "attr_sweetness"];
const ATTR_LABELS = ["Brightness", "Body", "Aroma", "Complexity", "Balance", "Sweetness"];

const FLAVOR_KEYS = ["flavor_spicy", "flavor_chocolaty", "flavor_nutty", "flavor_buttery", "flavor_fruity", "flavor_flowery", "flavor_winey", "flavor_earthy"];
const FLAVOR_LABELS = ["Spicy", "Chocolaty", "Nutty", "Buttery", "Fruity", "Flowery", "Winey", "Earthy"];

const SPEC_FIELDS = [
  { key: "price", label: "Price" },
  { key: "rating", label: "Rating" },
  { key: "country", label: "Country" },
  { key: "local_region", label: "Region" },
  { key: "category", label: "Category" },
  { key: "process", label: "Process" },
  { key: "variety", label: "Variety" },
  { key: "altitude", label: "Altitude" },
  { key: "harvest", label: "Harvest" },
  { key: "certifications", label: "Certifications" },
  { key: "organic", label: "Organic" },
  { key: "fair_trade", label: "Fair Trade" },
  { key: "rainforest_alliance", label: "Rainforest Alliance" },
  { key: "decaffeinated", label: "Decaf" },
];

/* ---------- State ---------- */
let allCoffees = [];
let filtered = [];
let sortCol = "rating";
let sortDir = -1;
let selectedIdx = -1;
let attrChart = null;
let flavorChart = null;

/* ---------- Data loading ---------- */
fetch("cbc-data.json")
  .then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(data => {
    allCoffees = data;
    filtered = [...allCoffees];
    document.getElementById("loading").style.display = "none";
    buildTableHead();
    sortAndRender();
  })
  .catch(err => {
    document.getElementById("loading").textContent = "Failed to load data: " + err.message;
  });

/* ---------- Search ---------- */
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    filtered = [...allCoffees];
  } else {
    filtered = allCoffees.filter(c =>
      Object.values(c).some(v => String(v).toLowerCase().includes(q))
    );
  }
  selectedIdx = -1;
  sortAndRender();
});

/* ---------- Table head ---------- */
function buildTableHead() {
  const tr = document.getElementById("table-head");
  tr.innerHTML = "";
  TABLE_COLS.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col.label;
    th.dataset.key = col.key;
    if (col.key === sortCol) {
      th.innerHTML += '<span class="sort-arrow">' + (sortDir > 0 ? "\u25B2" : "\u25BC") + '</span>';
    }
    th.addEventListener("click", () => {
      if (sortCol === col.key) {
        sortDir *= -1;
      } else {
        sortCol = col.key;
        sortDir = col.key === "name" ? 1 : -1;
      }
      sortAndRender();
    });
    tr.appendChild(th);
  });
}

/* ---------- Sorting ---------- */
function sortVal(c, key) {
  const v = c[key] || "";
  if (key === "price") return parseFloat(v.replace("$", "")) || 0;
  if (key === "rating") return parseFloat(v) || 0;
  return v.toLowerCase();
}

function sortAndRender() {
  filtered.sort((a, b) => {
    const va = sortVal(a, sortCol);
    const vb = sortVal(b, sortCol);
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
  renderTable();
  buildTableHead();
  document.getElementById("stats").textContent = filtered.length + " coffees";
}

/* ---------- Stars ---------- */
function starsHtml(rating) {
  const r = parseFloat(rating) || 0;
  if (r === 0) return "";
  let s = "";
  for (let i = 1; i <= 5; i++) {
    if (i <= Math.floor(r)) s += "\u2605";
    else if (i - 0.5 <= r) s += "\u00BD";
    else s += "\u2606";
  }
  return '<span class="stars">' + s + '</span>';
}

/* ---------- Table body ---------- */
function renderTable() {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  filtered.forEach((c, i) => {
    const tr = document.createElement("tr");
    if (i === selectedIdx) tr.classList.add("selected");
    TABLE_COLS.forEach(col => {
      const td = document.createElement("td");
      if (col.key === "rating") {
        td.innerHTML = starsHtml(c.rating);
      } else {
        td.textContent = c[col.key] || "";
      }
      if (col.wrap) td.classList.add("wrap");
      tr.appendChild(td);
    });
    tr.addEventListener("click", () => showDetail(i));
    tbody.appendChild(tr);
  });
}

/* ---------- Detail panel ---------- */
function showDetail(idx) {
  selectedIdx = idx;
  const c = filtered[idx];
  const panel = document.getElementById("detail-panel");

  document.getElementById("detail-name").textContent = c.name;
  const link = document.getElementById("detail-link");
  link.href = c.url;
  link.textContent = "View on Coffee Bean Corral \u2192";

  // Rating
  const ratingEl = document.getElementById("detail-rating");
  const r = parseFloat(c.rating) || 0;
  if (r > 0) {
    const reviews = c.review_count ? ' <span class="review-count">(' + esc(c.review_count) + ' reviews)</span>' : '';
    ratingEl.innerHTML = starsHtml(c.rating) + ' <strong>' + r.toFixed(1) + '</strong>' + reviews;
  } else {
    ratingEl.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem">No reviews yet</span>';
  }

  // Specs
  const specsEl = document.getElementById("detail-specs");
  specsEl.innerHTML = SPEC_FIELDS
    .filter(f => c[f.key])
    .map(f => '<div class="spec-item"><span class="spec-label">' + esc(f.label) + ':</span><span class="spec-value">' + esc(c[f.key]) + '</span></div>')
    .join("");

  // Notes
  const notesEl = document.getElementById("detail-notes");
  let notesHtml = "";
  if (c.cupping_notes) {
    notesHtml += '<div class="notes-section"><h3>Cupping Notes</h3><p>' + esc(c.cupping_notes) + '</p></div>';
  }
  if (c.description) {
    notesHtml += '<div class="notes-section"><h3>Description</h3><p>' + esc(c.description) + '</p></div>';
  }
  notesEl.innerHTML = notesHtml;

  // Charts
  renderAttrChart(c);
  renderFlavorChart(c);

  panel.classList.add("visible");
  panel.scrollIntoView({ behavior: "smooth", block: "start" });
  renderTable();
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById("close-detail").addEventListener("click", () => {
  document.getElementById("detail-panel").classList.remove("visible");
  selectedIdx = -1;
  renderTable();
});

/* ---------- Charts ---------- */
const chartColors = {
  attr: {
    bg: "rgba(139, 94, 60, 0.2)",
    border: "rgba(139, 94, 60, 0.8)",
    point: "rgba(139, 94, 60, 1)",
  },
  flavor: {
    bg: "rgba(196, 154, 108, 0.2)",
    border: "rgba(196, 154, 108, 0.8)",
    point: "rgba(196, 154, 108, 1)",
  },
};

function radarOpts(maxVal) {
  return {
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { display: false } },
    scales: {
      r: {
        beginAtZero: true,
        max: maxVal,
        ticks: { stepSize: 1, display: false },
        pointLabels: { font: { size: 11 }, color: "#7a6a5a" },
        grid: { color: "rgba(0,0,0,0.06)" },
        angleLines: { color: "rgba(0,0,0,0.06)" },
      },
    },
  };
}

function renderAttrChart(c) {
  const ctx = document.getElementById("attr-chart").getContext("2d");
  const data = ATTR_KEYS.map(k => parseFloat(c[k]) || 0);
  const hasData = data.some(v => v > 0);
  if (attrChart) attrChart.destroy();
  if (!hasData) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    return;
  }
  attrChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels: ATTR_LABELS,
      datasets: [{
        data: data,
        backgroundColor: chartColors.attr.bg,
        borderColor: chartColors.attr.border,
        pointBackgroundColor: chartColors.attr.point,
        pointRadius: 3,
        borderWidth: 2,
      }],
    },
    options: radarOpts(7),
  });
}

function renderFlavorChart(c) {
  const ctx = document.getElementById("flavor-chart").getContext("2d");
  const data = FLAVOR_KEYS.map(k => parseFloat(c[k]) || 0);
  const hasData = data.some(v => v > 0);
  if (flavorChart) flavorChart.destroy();
  if (!hasData) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    return;
  }
  flavorChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels: FLAVOR_LABELS,
      datasets: [{
        data: data,
        backgroundColor: chartColors.flavor.bg,
        borderColor: chartColors.flavor.border,
        pointBackgroundColor: chartColors.flavor.point,
        pointRadius: 3,
        borderWidth: 2,
      }],
    },
    options: radarOpts(4),
  });
}
</script>
</body>
</html>
