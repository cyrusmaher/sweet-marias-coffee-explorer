name: Scrape Coffee Bean Corral

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6am UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          npx playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/scrape_cbc.py

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cbc_coffees.csv data/cbc_detail_cache.json docs/cbc-data.json
          if git diff --cached --quiet; then
            echo "No data changes detected."
          else
            git commit -m "Update Coffee Bean Corral data $(date -u +%Y-%m-%d)"
            git push
          fi
