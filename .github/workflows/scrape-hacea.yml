name: Scrape Hacea Coffee

on:
  schedule:
    - cron: '20 6 * * 1'  # Every Monday 6:20am UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

env:
  GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
  VERTEX_AI_LOCATION: global
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # fallback if not using Vertex AI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          npx playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/scrape_hacea.py

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hacea_coffees.csv data/hacea_detail_cache.json data/match_cache.json docs/hacea-data.json
          if git diff --cached --quiet; then
            echo "No data changes detected."
          else
            git commit -m "Update Hacea coffee data $(date -u +%Y-%m-%d)"
            git push
          fi
